services:
  rag-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: advanced-multi-hop-rag-api
    ports:
      - "7860:7860"
    env_file:
      - .env
    environment:
      - PORT=7860
      - HOST=0.0.0.0
    volumes:
      # Optional: Mount the cache directory to prevent re-downloading HF models if the container restarts
      - huggingface_cache:/app/.cache/huggingface
    restart: unless-stopped

volumes:
  huggingface_cache:
